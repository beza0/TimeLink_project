services:
  db:
    image: postgres:16-alpine
    container_name: timelink-postgres
    environment:
      POSTGRES_USER: timebank_user
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: timebank
    
    ports:
      - "5433:5432"
    volumes:
      - timebank_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timebank_user -d timebank"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timelink-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/timebank
      SPRING_DATASOURCE_USERNAME: timebank_user
      SPRING_DATASOURCE_PASSWORD: "1234"
    depends_on:
      db:
        condition: service_healthy

volumes:
  timebank_pgdata:
