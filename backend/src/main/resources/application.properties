spring.application.name=timebank-backend
server.port=8080

# Docker Compose DB: localhost:5433 (bkz. docker-compose.yml). Yerel PG kullanıyorsanız URL'yi güncelleyin.
spring.datasource.url=jdbc:postgresql://localhost:5433/timebank
spring.datasource.username=timebank_user
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mevcut PostgreSQL volume'larında eksik sütunları düzeltmek için (ör. booked_minutes)
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.enabled=true
spring.flyway.out-of-order=true

management.endpoints.web.exposure.include=health,info
management.health.mail.enabled=false
spring.docker.compose.enabled=false

# Base64 profil fotoğrafı JSON gövdesi birkaç MB olabilir
server.tomcat.max-http-form-post-size=25MB
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=CHANGE_THIS_TO_LONG_RANDOM_SECRET_64CHARS_MINIMUM________________
app.jwt.expiration-minutes=120

# --- E-posta (doğrulama kodu) ---
# spring.mail.username/password = SMTP sunucusuna giriş (tek "gönderici/relay" hesabı).
# Kod, kayıt formundaki adrese gider (her kullanıcı kendi gelen kutusunu kullanır).
# Host yoksa veya app.mail.enabled=false ise gönderim kapalı; kod API loglarına düşer (bkz. RegistrationMailService).
# Yayın: SendGrid (smtp.sendgrid.net, user apikey), Amazon SES, Mailgun, Postmark — hepsi SMTP ile aynı alanlar.
# Yerel: Mailpit → SPRING_MAIL_HOST=localhost PORT=1025 AUTH=false
# app.public-base-url: e-posta metnindeki uygulama adresi.
app.public-base-url=http://localhost:3000
