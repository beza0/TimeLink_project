spring.application.name=timebank-backend
server.port=8080

# Docker Compose DB: localhost:5433 (bkz. docker-compose.yml). Yerel PG kullanıyorsanız URL'yi güncelleyin.
spring.datasource.url=jdbc:postgresql://localhost:5433/timebank
spring.datasource.username=timebank_user
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info
spring.docker.compose.enabled=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=CHANGE_THIS_TO_LONG_RANDOM_SECRET_64CHARS_MINIMUM________________
app.jwt.expiration-minutes=120